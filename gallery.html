<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | IGH Chakwal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a252f; --accent: #f1c40f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        nav { background: #fff; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-img { height: 50px; width: 50px; border-radius: 50%; border: 2px solid var(--accent); }
        nav ul { display: flex; list-style: none; }
        nav ul li a { color: var(--primary); text-decoration: none; margin-left: 20px; font-weight:700; text-transform: uppercase; font-size: 0.8rem; }
        
        .gallery-wrap { padding: 60px 10%; background: #fdfdfd; }
        .gallery-wrap h2 { font-size: 3rem; text-align: center; margin-bottom: 50px; color: var(--primary); }
        .gallery-wrap h2 span { color: var(--accent); }

        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .g-card { border-radius: 20px; overflow: hidden; position: relative; height: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: 0.4s; }
        .g-card:hover { transform: scale(1.02); }
        .g-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .g-card:hover img { transform: scale(1.1) rotate(2deg); }
        .g-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="display:flex; align-items:center; text-decoration:none; gap:10px;">
            <img src="1000015050.png" class="logo-img">
            <span style="color:var(--primary); font-weight:800;">IGH CHAKWAL</span>
        </a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>

    <div class="gallery-wrap">
        <h2>Photo <span>Showcase</span></h2>
        <div class="gallery-container">
            <div class="g-card">
                <img src="https://images.unsplash.com/photo-1611892440504-42a792e24d32?q=80&w=600" alt="Luxury Room">
                <div class="g-info"><h4>Luxury Suite</h4><p>Premium Living Experience</p></div>
            </div>
            <div class="g-card">
                <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?q=80&w=600" alt="Executive Bedroom">
                <div class="g-info"><h4>Executive Bedroom</h4><p>Comfort and Style</p></div>
            </div>
            <div class="g-card">
                <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?q=80&w=600" alt="Modern Interior">
                <div class="g-info"><h4>Modern Interior</h4><p>Bright and Clean</p></div>
            </div>
            <div class="g-card">
                <img src="https://images.unsplash.com/photo-1566665797739-1674de7a421a?q=80&w=600" alt="Deluxe Stay">
                <div class="g-info"><h4>Deluxe Stay</h4><p>Quality Guarantee</p></div>
            </div>
            <div class="g-card">
                <img src="1000015040.jpg">
                <div class="g-info"><h4>IGH Original View</h4><p>Royal Blue Theme</p></div>
            </div>
        </div>
    </div>
</body>
</html>
